<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bijou Getaways &mdash; VA Performance Dashboard &mdash; 2026-05-21</title>
<style>
:root { --bg:#0f172a; --surface:#1e293b; --surface2:#334155; --text:#f1f5f9; --text2:#94a3b8; --green:#10b981; --yellow:#f59e0b; --red:#ef4444; --blue:#3b82f6; --border:#334155; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:1200px; margin:0 auto; padding:24px 20px; }
header { margin-bottom:28px; }
h1 { font-size:26px; font-weight:700; }
h1 span { color:var(--blue); }
.header-meta { color:var(--text2); font-size:13px; margin-top:4px; }
.legend { background:var(--surface); border-radius:10px; padding:14px 20px; margin-bottom:20px; display:flex; flex-wrap:wrap; gap:20px; font-size:12px; color:var(--text2); }
.legend-item { display:flex; align-items:center; gap:6px; }
.legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.legend b { color:var(--text); font-weight:600; }
